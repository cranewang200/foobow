name: Foobow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.4

      - name: Install dependencies
        run: npm ci

      - name: Run unit, smoke, and PA checks
        run: npm test

      - name: Install API dependencies
        run: npm --prefix apps/api ci

      - name: Generate Prisma client
        run: npm --prefix apps/api run prisma:generate

      - name: Run API runtime tests
        run: npm run test:api

      - name: Install mobile dependencies
        run: npm --prefix apps/mobile ci

      - name: Run mobile typecheck
        run: npm run test:mobile

      - name: Run high severity audit gates
        run: npm run test:security

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser PA checks
        run: npm run test:browser

  api-db-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: foobow
          POSTGRES_PASSWORD: foobow
          POSTGRES_DB: foobow
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U foobow -d foobow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://foobow:foobow@localhost:55432/foobow?schema=public
      PSQL_DATABASE_URL: postgresql://foobow:foobow@localhost:55432/foobow
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.4

      - name: Install API dependencies
        run: npm --prefix apps/api ci

      - name: Generate Prisma client
        run: npm --prefix apps/api run prisma:generate

      - name: Apply SQL schema and seed
        run: |
          docker run --rm --network host -v "$PWD:/workspace" -w /workspace postgres:17-alpine sh -c "psql \"$PSQL_DATABASE_URL\" -f database/migrations/0001_initial.sql && psql \"$PSQL_DATABASE_URL\" -f database/migrations/0002_focus_sessions.sql && psql \"$PSQL_DATABASE_URL\" -f database/seeds/0001_reference_data.sql"

      - name: Run API DB integration suite
        run: npm --prefix apps/api run test:db-integration

  visual-regression:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run visual regression checks
        run: npm run test:visual
